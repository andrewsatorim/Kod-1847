<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Код 1847 · Мини-апп</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,600;0,6..96,700;1,6..96,400;1,6..96,500&family=Raleway:wght@200;300;400;500;600&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; background: #1a1a1c; color: #F5F0E8; font-family: 'Raleway', sans-serif; min-height: 100vh; }
  * { box-sizing: border-box; }
  body { overscroll-behavior: none; -webkit-font-smoothing: antialiased; }

  .stage {
    min-height: 100vh;
    padding: 40px 16px 200px;
    display: flex; flex-direction: column; align-items: center; gap: 48px;
  }

  .stage-head {
    text-align: center; max-width: 920px; margin: 0 auto 8px;
  }
  .stage-head .eyebrow {
    font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
    color: #B89860; opacity: 0.85;
  }
  .stage-head h1 {
    font-family: 'Bodoni Moda', serif; font-weight: 400;
    font-size: 42px; letter-spacing: 3px; margin: 10px 0 6px; color: #F5F0E8;
  }
  .stage-head p {
    font-size: 12px; color: #9A958B; letter-spacing: 0.5px; max-width: 620px; margin: 8px auto 0;
    line-height: 1.6;
  }

  .variants {
    display: flex; gap: 40px; flex-wrap: wrap; justify-content: center;
  }
  .variant-col { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .variant-col .label {
    font-size: 9px; letter-spacing: 3px; color: #B89860; text-transform: uppercase;
  }
  .variant-col .sublabel {
    font-family: 'Bodoni Moda', serif; font-style: italic;
    font-size: 15px; color: #F5F0E8; letter-spacing: 0.5px;
  }

  /* Tweaks panel */
  .tweaks {
    position: fixed; right: 18px; bottom: 18px; width: 300px;
    background: #0D0D10; border: 1px solid #B89860;
    padding: 18px; color: #F5F0E8; font-family: 'Raleway', sans-serif;
    z-index: 9999; max-height: 85vh; overflow: auto;
    display: none;
  }
  .tweaks.open { display: block; }
  .tweaks h3 {
    margin: 0 0 14px; font-family: 'Bodoni Moda', serif; font-weight: 400;
    font-size: 15px; letter-spacing: 2.5px; text-transform: uppercase; color: #B89860;
    display: flex; align-items: center; justify-content: space-between;
  }
  .tweaks h3 .close { cursor: pointer; font-size: 18px; color: #9A958B; background: none; border: none; }
  .tweaks-section {
    padding: 12px 0; border-top: 0.5px solid rgba(184,152,96,0.25);
  }
  .tweaks-section:first-of-type { border-top: none; padding-top: 0; }
  .tweaks-label {
    font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;
    color: #9A958B; margin-bottom: 8px;
  }
  .tweaks-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .tweaks-row button {
    flex: 1 1 auto; padding: 8px 10px; min-width: 64px;
    background: transparent; color: #F5F0E8;
    border: 0.5px solid rgba(184,152,96,0.4);
    font-family: 'Raleway', sans-serif; font-size: 10px;
    letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
    transition: all 0.15s;
  }
  .tweaks-row button.active {
    background: #B89860; color: #08080A; border-color: #B89860;
  }
  .tweaks-input {
    width: 100%; background: transparent; color: #F5F0E8;
    border: 0.5px solid rgba(184,152,96,0.4); padding: 8px 10px;
    font-family: 'Raleway', sans-serif; font-size: 12px; letter-spacing: 0.5px;
  }
  .tweaks-input:focus { outline: none; border-color: #B89860; }

  /* FAB — shows only when edit mode enabled but panel closed */
  .tweaks-fab {
    position: fixed; right: 18px; bottom: 18px; z-index: 9998;
    width: 54px; height: 54px; border-radius: 50%;
    background: #08080A; border: 1px solid #B89860; color: #B89860;
    cursor: pointer; display: none; align-items: center; justify-content: center;
    font-family: 'Bodoni Moda', serif; font-size: 14px; letter-spacing: 1.5px;
  }
  .tweaks-fab.visible { display: flex; }

  @keyframes kodPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.35; transform: scale(0.85); }
  }
  .kod-pulse { animation: kodPulse 1.6s ease-in-out infinite; }
</style>
</head>
<body>

<div id="root"></div>

<button id="tweaks-fab" class="tweaks-fab" aria-label="Tweaks">18·47</button>

<div id="tweaks-panel" class="tweaks">
  <h3>
    <span>Tweaks</span>
    <button class="close" id="tweaks-close">×</button>
  </h3>
  <div id="tweaks-body"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

</script>
<script type="text/babel" data-presets="react">
// Kod 1847 brand mark — double frame + "К" monogram + 18/47 + diamond finial

// Site-style logo: single square frame, diamond sits on the top edge,
// full-height vertical divider, serif "К" and Bodoni 18/47.
function KodMarkSite({ size = 96, gold = '#B89860' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" style={{ display: 'block' }}>
      {/* single square frame */}
      <rect x="6" y="6" width="88" height="88" fill="none" stroke={gold} strokeWidth="0.9" />
      {/* diamond sitting on the top edge */}
      <g transform="translate(50 6) rotate(45)">
        <rect x="-3" y="-3" width="6" height="6" fill={gold} />
      </g>
      {/* full-height vertical divider */}
      <line x1="50" y1="15" x2="50" y2="85" stroke={gold} strokeWidth="0.7" />
      {/* serif К (left column) */}
      <text x="30" y="62" textAnchor="middle" fill={gold}
        style={{ fontFamily: '"Bodoni Moda", "Bodoni 72", "Didot", serif', fontSize: 34, fontWeight: 400 }}>К</text>
      {/* 18 / 47 numerals (right column) */}
      <text x="70" y="46" textAnchor="middle" fill={gold}
        style={{ fontFamily: '"Bodoni Moda", "Bodoni 72", serif', fontSize: 14, fontWeight: 400, letterSpacing: 0.5 }}>18</text>
      <text x="70" y="68" textAnchor="middle" fill={gold}
        style={{ fontFamily: '"Bodoni Moda", "Bodoni 72", serif', fontSize: 14, fontWeight: 400, letterSpacing: 0.5 }}>47</text>
    </svg>
  );
}

function KodMark({ size = 48, gold = '#B89860', bg = 'transparent', mono = false }) {
  const stroke = mono ? 'currentColor' : gold;
  const op = mono ? 1 : 1;
  // viewBox 100x100, drawn at scale
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" style={{ display: 'block' }}>
      {bg !== 'transparent' && <rect x="0" y="0" width="100" height="100" fill={bg} />}
      {/* outer frame */}
      <rect x="3" y="3" width="94" height="94" fill="none" stroke={stroke} strokeWidth="1.2" opacity={op} />
      {/* inner frame */}
      <rect x="8" y="8" width="84" height="84" fill="none" stroke={stroke} strokeWidth="0.6" opacity={op * 0.3} />
      {/* diamond finial */}
      <g transform="translate(50 5.5) rotate(45)">
        <rect x="-2.4" y="-2.4" width="4.8" height="4.8" fill={stroke} opacity={op * 0.55} />
      </g>
      {/* vertical divider between K and numerals */}
      <line x1="50" y1="22" x2="50" y2="78" stroke={stroke} strokeWidth="0.4" opacity={op * 0.25} />
      {/* monogram К — vertical axis + two diagonals from mid */}
      <g stroke={stroke} strokeWidth="1.6" fill="none" strokeLinecap="square" opacity={op}>
        <line x1="26" y1="28" x2="26" y2="72" />
        <line x1="26" y1="50" x2="42" y2="30" />
        <line x1="26" y1="50" x2="42" y2="70" />
      </g>
      {/* 18 / 47 numerals — Bodoni Moda */}
      <text x="71" y="44" textAnchor="middle" fill={stroke}
        style={{ fontFamily: '"Bodoni Moda", "Bodoni 72", serif', fontSize: 15, fontWeight: 400, letterSpacing: 0.5 }} opacity={op}>18</text>
      <text x="71" y="68" textAnchor="middle" fill={stroke}
        style={{ fontFamily: '"Bodoni Moda", "Bodoni 72", serif', fontSize: 15, fontWeight: 400, letterSpacing: 0.5 }} opacity={op}>47</text>
    </svg>
  );
}

// Diamond divider — horizontal line with centered rhombus
function Divider({ color = '#B89860', opacity = 0.5, diamond = true, style = {} }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 10, width: '100%',
      color, opacity, ...style,
    }}>
      <div style={{ flex: 1, height: 1, background: 'currentColor' }} />
      {diamond && (
        <div style={{
          width: 5, height: 5, background: 'currentColor',
          transform: 'rotate(45deg)', flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, height: 1, background: 'currentColor' }} />
    </div>
  );
}

// Small rhombus — inline accent
function Diamond({ size = 4, color = '#B89860', opacity = 1 }) {
  return (
    <span style={{
      display: 'inline-block', width: size, height: size,
      background: color, transform: 'rotate(45deg)',
      opacity, verticalAlign: 'middle',
    }} />
  );
}

// Tracked caps helper text component
function Caps({ children, size = 10, tracking = 2, color, style = {} }) {
  return (
    <span style={{
      fontFamily: '"Raleway", sans-serif',
      fontSize: size, fontWeight: 400,
      textTransform: 'uppercase', letterSpacing: tracking,
      color, ...style,
    }}>{children}</span>
  );
}

Object.assign(window, { KodMark, KodMarkSite, Divider, Diamond, Caps });

</script>
<script type="text/babel" data-presets="react">
// booking-card.jsx — variations of the "nearest booking" card on the home screen
// All share: dark ink card, double frame, notched bottom edge with a centered
// "Управление бронированием" pill that looks welded into the frame.
//
// Variants (one per state):
//   pill   · UPCOMING   — ceremonial ticket (day + time, status: confirmed)
//   ticket · TODAY      — functional perforated pass (big date + hall strip)
//   stamp  · SOON       — live countdown, pulse, single-glance
//   strip  · MINIMAL    — one-row reservation strip (date · time · hall)

// Shared CTA label: "Управление бронированием"

const BC_GOLD = '#B89860';
const BC_INK  = '#08080A';
const BC_LIN  = '#F5F0E8';
const BC_STN  = '#9A958B';
const BC_CARD = '#0D0D10';

// ── Inline CTA ——————————————————————————————————————————————
function InlineCTA({ label = 'Управление бронированием', onClick, invert = false }) {
  const bg = invert ? BC_LIN : BC_GOLD;
  const fg = invert ? BC_INK : BC_INK;
  return (
    <button onClick={onClick} style={{
      display: 'block', width: '100%',
      padding: '14px 26px',
      background: bg, color: fg, border: 'none',
      fontFamily: '"Raleway", sans-serif', fontSize: 10, letterSpacing: 3,
      textTransform: 'uppercase', cursor: 'pointer', whiteSpace: 'nowrap',
    }}>{label}</button>
  );
}

// ── Notched CTA —————————————————————————————————————————————
// A pill button that sits over the bottom edge of the card, with a masked
// "bite" cut out of the card so the pill reads as if welded into the frame.
function NotchedCTA({ label = 'Управление бронированием', onClick, invert = false }) {
  const bg = invert ? BC_LIN : BC_GOLD;
  const fg = invert ? BC_INK : BC_INK;
  return (
    <div style={{
      position: 'absolute', left: '50%', bottom: -22, transform: 'translate(-50%, 0)',
      zIndex: 4,
    }}>
      <button onClick={onClick} style={{
        padding: '14px 26px',
        background: bg, color: fg, border: 'none',
        fontFamily: '"Raleway", sans-serif', fontSize: 10, letterSpacing: 3,
        textTransform: 'uppercase', cursor: 'pointer', whiteSpace: 'nowrap',
        boxShadow: '0 0 0 4px #08080A, 0 0 0 5px ' + BC_GOLD,
      }}>{label}</button>
    </div>
  );
}

// ── V1 · PILL — UPCOMING (ceremonial) ————————————————————————
function BookingCardPill({ b, t, onManage }) {
  return (
    <div style={{ position: 'relative', padding: '0' }}>
      <div style={{
        position: 'relative', background: BC_CARD,
        border: `1px solid ${BC_GOLD}`, padding: '18px 22px 16px',

            color: BC_LIN, letterSpacing: 0.3,
          }}>{b.time}</div>
        </div>

        <div style={{
          marginTop: 12, paddingTop: 10,
          borderTop: `0.5px solid rgba(184,152,96,0.3)`,
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        }}>
          <Caps color={BC_STN} size={8} tracking={2}>{b.dayLabel}</Caps>
          <div style={{ color: BC_STN, fontSize: 11, letterSpacing: 0.2 }}>

}

// ── V2 · TICKET — TODAY (functional pass, perforated) ————————
function BookingCardTicket({ b, t, onManage }) {
  // punched edge dots
  const dots = Array.from({ length: 18 }).map((_, i) => (

// ── V3 · STAMP — SOON (live countdown, pulse) ————————————————
function BookingCardStamp({ b, t, onManage, hoursLeft = 1 }) {
  return (
    <div style={{ position: 'relative', padding: '0 0 36px' }}>
      <div style={{
        position: 'relative', background: BC_CARD,

        <div style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',

// ── V4 · STRIP — MINIMAL (single row + pill) ——————————————————
function BookingCardStrip({ b, t, onManage }) {
  return (
    <div style={{ position: 'relative', padding: '0 0 36px' }}>
      <div style={{
        position: 'relative', background: BC_CARD,

          <div style={{ width: 0.5, height: 44, background: BC_GOLD, opacity: 0.4 }} />

          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 10 }}>
              <div style={{
                fontFamily: '"Bodoni Moda", serif', fontSize: 22, lineHeight: 1,
                color: BC_LIN, letterSpacing: 0.3,
              }}>{b.time}</div>
              <Caps color={BC_STN} size={8} tracking={2}>{b.dayLabel}</Caps>
            </div>
            <div style={{
              marginTop: 6, color: BC_STN, fontSize: 11,
              whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
            }}>
              {b.hall} · {t.guests(b.guests)} · <span style={{ color: '#7fb57f' }}>подтверждена</span>
            </div>
          </div>
        </div>

        <div style={{ height: 8 }} />
      </div>

      <NotchedCTA onClick={onManage} />
    </div>
  );
}

// ── Dispatcher ————————————————————————————————————————————————
function BookingCard({ variant = 'pill', b, t, onManage, hoursLeft }) {
  if (!b) return null;
  if (variant === 'ticket') return <BookingCardTicket b={b} t={t} onManage={onManage} />;
  if (variant === 'stamp')  return <BookingCardStamp  b={b} t={t} onManage={onManage} hoursLeft={hoursLeft} />;
  if (variant === 'strip')  return <BookingCardStrip  b={b} t={t} onManage={onManage} />;
  return <BookingCardPill b={b} t={t} onManage={onManage} />;
}

Object.assign(window, {
  BookingCard,
  BookingCardPill, BookingCardTicket, BookingCardStamp, BookingCardStrip,
  NotchedCTA,
});

</script>

function RhombusPattern({ color = GOLD, opacity = 0.06, step = 22, size = 3 }) {
  // SVG-based tiling background
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='${step}' height='${step}'><rect x='${step/2 - size/2}' y='${step/2 - size/2}' width='${size}' height='${size}' transform='rotate(45 ${step/2} ${step/2})' fill='${color}' fill-opacity='${opacity}'/></svg>`;
  const url = `url("data:image/svg+xml;utf8,${encodeURIComponent(svg)}")`;
  return <div style={{ position: 'absolute', inset: 0, backgroundImage: url, pointerEvents: 'none' }} />;
}

function DoubleFrame({ children, color = GOLD, pad = 14, innerOp = 0.3, style = {} }) {
  return (
    <div style={{
      position: 'relative', padding: pad,

// Tab bar
function TabBar({ t, pattern, light }) {
  const bg = light ? '#FFFDF7' : '#08080A';
  const border = light ? 'rgba(0,0,0,0.08)' : 'rgba(184,152,96,0.3)';
  const dim = light ? '#888' : STONE;
  const active = light ? INK : GOLD;
  const labels = t.tabs;
  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0,
      padding: '10px 12px 28px',

      borderTop: `0.5px solid ${border}`,

      {labels.map((lbl, i) => (
        <div key={i} style={{
          flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
          color: i === 0 ? active : dim,
        }}>
          <TabIcon kind={['home','event','card'][i]} color={i === 0 ? active : dim} />
          <Caps size={7.5} tracking={1.8} color={i === 0 ? active : dim}>{lbl}</Caps>
        </div>
      ))}
    </div>
  );
}

function QROverlay({ open, onClose, memberNo, name, lang, style = 'A' }) {
  const t = T[lang];
  if (!open) return null;
  const dark = style !== 'C';
  const bg = dark ? INK : LINEN;
  const fg = dark ? LINEN : INK;

  // Fake QR grid
  const cells = React.useMemo(() => {
    const out = [];
    const size = 25;
    const seed = (memberNo || '0047').replace(/\D/g, '') || '47';
    let s = parseInt(seed, 10) || 47;
    for (let y = 0; y < size; y++) {
      const row = [];
      for (let x = 0; x < size; x++) {
        s = (s * 9301 + 49297) % 233280;
        row.push((s / 233280) > 0.5 ? 1 : 0);
      }
      out.push(row);
    }
    // finder patterns (corners)
    const mark = (ox, oy) => {
      for (let y = 0; y < 7; y++) for (let x = 0; x < 7; x++) {
        const inner = (x >= 2 && x <= 4 && y >= 2 && y <= 4);
        const border = (x === 0 || x === 6 || y === 0 || y === 6);
        out[oy + y][ox + x] = (border || inner) ? 1 : 0;
      }
    };
    mark(0, 0); mark(size - 7, 0); mark(0, size - 7);
    return out;
  }, [memberNo]);

  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 100,
      background: bg, color: fg, padding: '66px 22px 40px',
      fontFamily: '"Raleway", sans-serif',
      display: 'flex', flexDirection: 'column',
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
        <Caps color={dark ? STONE : INK} size={9} tracking={3} style={{ opacity: 0.7 }}>{t.pass}</Caps>
        <button onClick={onClose} style={{
          background: 'transparent', border: `0.5px solid ${dark ? GOLD : INK}`,
          color: dark ? GOLD : INK, padding: '7px 14px', cursor: 'pointer',
          fontFamily: '"Raleway", sans-serif', fontSize: 9, letterSpacing: 2.5, textTransform: 'uppercase',
        }}>{t.close}</button>
      </div>

      <div style={{ textAlign: 'center', marginBottom: 20 }}>
        <KodMark size={42} gold={dark ? GOLD : INK} mono={!dark}/>
      </div>

      <div style={{ textAlign: 'center', marginBottom: 26 }}>
        <div style={{ fontFamily: '"Bodoni Moda", serif', fontSize: 16, letterSpacing: 3 }}>КОД 1847</div>
        <Caps color={STONE} size={8} tracking={2.5} style={{ display: 'block', marginTop: 6 }}>
          {t.member} · {memberNo}
        </Caps>
      </div>

      {/* QR with double frame */}
      <div style={{
        width: 260, height: 260, margin: '0 auto', position: 'relative', padding: 10,
        border: `1px solid ${dark ? GOLD : INK}`, background: dark ? '#0D0D10' : '#fff',
      }}>
        <div style={{
          position: 'absolute', inset: 5, border: `0.5px solid ${dark ? GOLD : INK}`, opacity: 0.3,
          pointerEvents: 'none',
        }} />
        <div style={{
          position: 'absolute', top: 2.5, left: '50%', transform: 'translate(-50%, -50%) rotate(45deg)',
          width: 5, height: 5, background: dark ? GOLD : INK, opacity: 0.6,
        }} />
        {/* QR grid */}
        <svg viewBox="0 0 25 25" width="100%" height="100%" shapeRendering="crispEdges">
          {cells.map((row, y) => row.map((v, x) => v
            ? <rect key={`${x}-${y}`} x={x} y={y} width="1" height="1" fill={dark ? LINEN : INK} />
            : null))}
        </svg>
      </div>

      <div style={{ textAlign: 'center', marginTop: 22 }}>
        <div style={{
          fontFamily: '"Bodoni Moda", serif', fontStyle: 'italic', fontSize: 20, letterSpacing: 0.3,
        }}>{name}</div>
        <div style={{ fontSize: 11, color: dark ? STONE : '#666', marginTop: 4, letterSpacing: 0.8 }}>
          {lang === 'ru' ? 'Код обновляется каждые 60 секунд' : 'Code refreshes every 60 seconds'}
        </div>
      </div>

      <div style={{ flex: 1 }} />
      <div style={{ maxWidth: 160, margin: '0 auto' }}>
        <Divider color={dark ? GOLD : INK} opacity={0.4} />
      </div>
      <Caps color={dark ? STONE : '#666'} size={8} tracking={3} style={{ display: 'block', textAlign: 'center', marginTop: 14 }}>
        EST. 1847 · МОСКВА · АРБАТ
      </Caps>
    </div>
  );
}

    // 14:00 → 01:30, every 30 min

      for (const m of [0, 30]) {
        const hh = (h % 24).toString().padStart(2, '0');
        const mm = m.toString().padStart(2, '0');

    return arr;
  }, []);

  const ITEM_H = 44;

  React.useEffect(() => {
    if (!scrollRef.current) return;
    const i = times.indexOf(time);
    if (i < 0) return;
    scrollRef.current.scrollTop = i * ITEM_H;
  }, []);

  const onScroll = () => {
    const el = scrollRef.current;
    if (!el) return;
    clearTimeout(el._snap);
    el._snap = setTimeout(() => {
      const i = Math.round(el.scrollTop / ITEM_H);
      const v = times[Math.max(0, Math.min(times.length - 1, i))];

          textAlign: 'center', marginTop: 6, marginBottom: 40,

        <div style={fieldWrap}>
          <div style={labelStyle}>Дата</div>
          <input
            type="date" value={date} onChange={(e) => setDate(e.target.value)}
            style={{
              ...inputStyle,
              color: date ? BK_LINEN : 'rgba(245,240,232,0.35)',
              colorScheme: 'dark',
            }}

        </div>

        {/* Время */}
        <div style={{ paddingBottom: 22, marginBottom: 22 }}>
          <div style={labelStyle}>Время</div>
          <div style={{
            position: 'relative', marginTop: 18,
            height: VISIBLE * ITEM_H,
            maskImage: 'linear-gradient(to bottom, transparent 0, #000 22%, #000 78%, transparent 100%)',

            marginTop: 18, textAlign: 'center',

        </label>

        {/* Сводка — Ваше бронирование */}

          position: 'relative', padding: '18px 20px',
          border: `0.5px solid ${BK_GOLD}`, background: BK_SOFT,

          <div style={{ marginTop: 14, display: 'flex', flexDirection: 'column', gap: 10 }}>

      </div>

      {/* step content (grows to fill) */}
      <div style={{ padding: '0 22px 28px', position: 'relative', zIndex: 2, flex: 1 }}>
        {step === 1 && <>
          <StepHeader num={1} total={total} title={copy.stepHall} />

          <TimeGrid value={state.time} onChange={(v) => setState({ ...state, time: v })} hall={state.hall} />
        </>}
        {step === 4 && <>
          <StepHeader num={4} total={total} title={copy.stepGuests} />
          <GuestStepper value={state.guests} onChange={(v) => setState({ ...state, guests: v })} copy={copy} />
          <div style={{ marginTop: 26 }}>
            <Caps color={BK_STONE} size={8} tracking={2.5}>ИТОГО</Caps>

              <SummaryPlate state={state} copy={copy} compact />

        </>}
      </div>

      <div style={{
        padding: '18px 22px 40px', display: 'flex', gap: 8,

        {step > 1 && (
          <button onClick={() => setStep(step - 1)} style={{
            padding: '16px 22px',
            background: 'transparent', color: BK_GOLD, border: `0.5px solid ${BK_GOLD}`,
            fontFamily: '"Raleway", sans-serif', fontSize: 10, letterSpacing: 3,
            textTransform: 'uppercase', cursor: 'pointer', flexShrink: 0,

          flex: 1, padding: '16px',
          background: BK_GOLD, color: BK_INK, border: 'none',
          fontFamily: '"Raleway", sans-serif', fontSize: 11, letterSpacing: 3,
          textTransform: 'uppercase', cursor: 'pointer',
        }}>{step === total ? copy.cta : 'Дальше'}</button>
      </div>
    </div>
  );

function StepBar({ step, total }) {

function StepHeader({ num, total, title }) {

  const url = `url("data:image/svg+xml;utf8,${encodeURIComponent(svg)}")`;
  return <div style={{ position: 'absolute', inset: 0, backgroundImage: url, pointerEvents: 'none' }} />;
}

        );
      })}
    </div>
  );
}

function EvTabIcon({ kind, color }) {
  const s = 18;
  const st = { stroke: color, strokeWidth: 1, fill: 'none' };
  switch (kind) {
    case 'home':
      return <svg width={s} height={s} viewBox="0 0 18 18"><path d="M2 8l7-5 7 5v8H2z" {...st}/></svg>;
    case 'event':
      return <svg width={s} height={s} viewBox="0 0 18 18"><rect x="2.5" y="4" width="13" height="11" {...st}/><path d="M2.5 8h13M6 2v4M12 2v4" {...st}/></svg>;
    case 'card':
      return <svg width={s} height={s} viewBox="0 0 18 18"><rect x="2" y="4" width="14" height="10" {...st}/><path d="M2 8h14" {...st}/></svg>;
  }
  return null;
}

</script>

<script type="text/babel" data-presets="react">
// manage.jsx — Three variants of the "Manage booking" screen
// Shared domain state: { hall, date, time, guests }.
// Inline edit: tapping a field turns it into a picker in place.
// Entry from: the "Управление бронированием" button on home.
// Header: «Управление бронированием». No QR here. No invite. No rules block.
// Cancel: discreet text link at the bottom.

const MG_GOLD = '#B89860';
const MG_INK  = '#08080A';
const MG_LINEN = '#F5F0E8';
const MG_STONE = '#9A958B';
const MG_SOFT = '#0D0D10';
const MG_DANGER = '#b26c5a';

// date pool: 10 days from Apr 22
const MG_DATES = (() => {
  const base = new Date(2026, 3, 22);
  const wk = ['вс','пн','вт','ср','чт','пт','сб'];
  const mo = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  return Array.from({length: 14}).map((_,i) => {
    const d = new Date(base); d.setDate(base.getDate()+i);
    const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    return { iso, day: d.getDate(), wk: wk[d.getDay()], mo: mo[d.getMonth()] };
  });
})();
const MG_TIMES = ['14:00','14:30','15:00','15:30','16:00','17:00','18:00','18:30','19:00','19:30','20:00','20:30','21:00','22:00','23:00','00:00','01:00'];
const MG_HALLS = [
  { id: 'tea',    title: 'Чайный',          sub: 'до 23:00' },
  { id: 'lounge', title: 'Кальянный',       sub: 'до 02:00' },
];

function MgBg() {
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='22' height='22'><rect x='10' y='10' width='3' height='3' transform='rotate(45 11 11)' fill='${MG_GOLD}' fill-opacity='0.05'/></svg>`;
  const url = `url("data:image/svg+xml;utf8,${encodeURIComponent(svg)}")`;
  return <div style={{ position:'absolute', inset:0, backgroundImage:url, pointerEvents:'none' }} />;
}

function MgHeader({ title = 'Управление бронированием' }) {
  return (
    <div style={{ padding: '54px 22px 6px', position:'relative', zIndex:2,
      display:'flex', alignItems:'center', gap:12 }}>
      <button style={{
        width:30, height:30, border:`0.5px solid rgba(184,152,96,0.4)`,
        background:'transparent', color:MG_GOLD, cursor:'pointer',
        display:'flex', alignItems:'center', justifyContent:'center',
      }}>
        <svg width="7" height="11" viewBox="0 0 8 12"><path d="M7 1l-5 5 5 5" stroke={MG_GOLD} strokeWidth="0.8" fill="none"/></svg>
      </button>
      <div style={{ flex:1, textAlign:'center',
        fontSize:9, letterSpacing:3, color:MG_GOLD, textTransform:'uppercase' }}>
        {title}
      </div>
      <div style={{ width:30 }} />
    </div>
  );
}

function Diamond() {
  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:10, margin:'14px 0 6px' }}>
      <div style={{ width:28, height:0.5, background:MG_GOLD, opacity:0.4 }} />
      <div style={{ width:4, height:4, background:MG_GOLD, transform:'rotate(45deg)', opacity:0.7 }} />
      <div style={{ width:28, height:0.5, background:MG_GOLD, opacity:0.4 }} />
    </div>
  );
}

function fmtDateLong(iso) {
  const d = MG_DATES.find(x => x.iso === iso);
  const full = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  if (!d) return iso;
  const [y,m] = iso.split('-');
  return `${d.day} ${full[Number(m)-1]}`;
}
function dayLabel(iso) {
  const d = MG_DATES.find(x => x.iso === iso);
  return d ? d.wk : '';
}
function hallTitle(id) {
  return (MG_HALLS.find(h => h.id === id) || MG_HALLS[0]).title;
}
function hallSub(id) {
  return (MG_HALLS.find(h => h.id === id) || MG_HALLS[0]).sub;
}

// ─── Shared inline-edit pickers ─────────────────────────────────────────
function DateStrip({ value, onChange }) {
  return (
    <div style={{ marginTop:10, overflowX:'auto', scrollbarWidth:'none',
      display:'flex', gap:8, paddingBottom:4 }}>
      {MG_DATES.map(d => {
        const on = value === d.iso;
        return (
          <button key={d.iso} onClick={() => onChange(d.iso)} style={{
            flexShrink:0, width:54, padding:'10px 0',
            background: on ? MG_GOLD : 'transparent',
            border: `0.5px solid ${on ? MG_GOLD : 'rgba(184,152,96,0.3)'}`,
            color: on ? MG_INK : MG_LINEN, cursor:'pointer',
            display:'flex', flexDirection:'column', alignItems:'center', gap:2,
          }}>
            <div style={{ fontSize:8.5, letterSpacing:1.8, textTransform:'uppercase', opacity:.8 }}>{d.wk}</div>
            <div style={{ fontFamily:'"Bodoni Moda", serif', fontSize:20, lineHeight:1 }}>{d.day}</div>
            <div style={{ fontSize:8, letterSpacing:1.4, opacity:.7, textTransform:'uppercase' }}>{d.mo}</div>
          </button>
        );
      })}
    </div>
  );
}

function TimeWheel({ value, onChange }) {
  const ITEM_H = 44;
  const VISIBLE = 5;
  const PAD = ITEM_H * ((VISIBLE - 1) / 2);
  const scrollRef = React.useRef(null);

  React.useEffect(() => {
    if (!scrollRef.current) return;
    const i = Math.max(0, MG_TIMES.indexOf(value));
    scrollRef.current.scrollTop = i * ITEM_H;
  }, []);

  const onScroll = () => {
    const el = scrollRef.current;
    if (!el) return;
    clearTimeout(el._snap);
    el._snap = setTimeout(() => {
      const i = Math.round(el.scrollTop / ITEM_H);
      const v = MG_TIMES[Math.max(0, Math.min(MG_TIMES.length - 1, i))];
      if (v && v !== value) onChange(v);
      el.scrollTo({ top: i * ITEM_H, behavior: 'smooth' });
    }, 90);
  };

  return (
    <div style={{
      marginTop: 10, position: 'relative', height: VISIBLE * ITEM_H,
      maskImage: 'linear-gradient(to bottom, transparent 0, #000 22%, #000 78%, transparent 100%)',
      WebkitMaskImage: 'linear-gradient(to bottom, transparent 0, #000 22%, #000 78%, transparent 100%)',
    }}>
      <div style={{
        position: 'absolute', left: 0, right: 0,
        top: PAD, height: ITEM_H,
        borderTop: `0.5px solid ${MG_GOLD}`,
        borderBottom: `0.5px solid ${MG_GOLD}`,
        pointerEvents: 'none', zIndex: 2,
      }} />
      <div ref={scrollRef} onScroll={onScroll} style={{
        height: '100%', overflowY: 'auto', scrollSnapType: 'y mandatory', scrollbarWidth: 'none',
      }}>
        <div style={{ height: PAD }} />
        {MG_TIMES.map(s => {
          const active = value === s;
          return (
            <div key={s} style={{
              height: ITEM_H, display: 'flex', alignItems: 'center', justifyContent: 'center',
              scrollSnapAlign: 'center',
              fontFamily: '"Bodoni Moda", serif',
              fontSize: active ? 24 : 18, color: MG_LINEN,
              opacity: active ? 1 : 0.45, letterSpacing: 0.3, lineHeight: 1,
              transition: 'font-size .15s, opacity .15s',
            }}>{s}</div>
          );
        })}
        <div style={{ height: PAD }} />
      </div>
    </div>
  );
}

function HallPicker({ value, onChange }) {
  return (
    <div style={{ marginTop:10, display:'flex', gap:10 }}>
      {MG_HALLS.map(h => {
        const on = h.id === value;
        return (
          <button key={h.id} onClick={() => onChange(h.id)} style={{
            flex:1, padding:'14px 12px', textAlign:'left',
            background: on ? 'rgba(184,152,96,0.08)' : 'transparent',
            border:`0.5px solid ${on ? MG_GOLD : 'rgba(184,152,96,0.3)'}`,
            color:MG_LINEN, cursor:'pointer',
          }}>
            <div style={{
              fontFamily:'"Bodoni Moda", serif', fontSize:15, color:MG_LINEN,
            }}>{h.title}</div>
            <div style={{ fontSize:10, color:MG_STONE, marginTop:3 }}>{h.sub}</div>
          </button>
        );
      })}
    </div>
  );
}

function GuestsStepper({ value, onChange }) {
  return (
    <div style={{ marginTop:10, display:'flex', alignItems:'center', gap:18, justifyContent:'space-between' }}>
      <button onClick={() => onChange(Math.max(1, value-1))} style={{
        width:40, height:40, border:`0.5px solid rgba(184,152,96,0.4)`,
        background:'transparent', color:MG_GOLD, cursor:'pointer', fontSize:20, lineHeight:1,
      }}>–</button>
      <div style={{
        flex:1, textAlign:'center',
        fontFamily:'"Bodoni Moda", serif', fontSize:40, color:MG_LINEN, lineHeight:1,
      }}>
        {value}
        <div style={{
          fontFamily:'"Raleway", sans-serif', fontSize:9, letterSpacing:2.5,
          color:MG_STONE, textTransform:'uppercase', marginTop:6,
        }}>{value===1?'гость':value<5?'гостя':'гостей'}</div>
      </div>
      <button onClick={() => onChange(Math.min(12, value+1))} style={{
        width:40, height:40, border:`0.5px solid rgba(184,152,96,0.4)`,
        background:'transparent', color:MG_GOLD, cursor:'pointer', fontSize:20, lineHeight:1,
      }}>+</button>
    </div>
  );
}

            <div style={{ display:'flex', alignItems:'flex-end', gap:20, marginTop:8 }}>

                <div style={{ fontFamily:'"Bodoni Moda", serif', fontSize:38, lineHeight:0.95, color:MG_LINEN }}>
                  {(MG_DATES.find(d => d.iso === state.date) || MG_DATES[0]).day}
                </div>
                <div style={{ fontSize:9, letterSpacing:2.5, color:MG_GOLD, textTransform:'uppercase', marginTop:8 }}>
                  {fmtDateLong(state.date).split(' ')[1]} · {dayLabel(state.date)}
                </div>

        {/* field list */}

          </FieldRow>

            open={open==='time'} onClick={() => toggle('time')}>

          </FieldRow>

            open={open==='guests'} onClick={() => toggle('guests')}>

          </FieldRow>
        </div>

        {/* perforation */}
        <div style={{
          display:'flex', alignItems:'center', gap:6, padding:'28px 22px 10px', position:'relative', zIndex:2,
        }}>
          {Array.from({length:28}).map((_,i) => (
            <div key={i} style={{ flex:1, height:0.5, background: i%2? 'transparent' : 'rgba(184,152,96,0.4)' }} />
          ))}
        </div>

        {/* cancel link */}
        <div style={{
          textAlign:'center', padding:'18px 22px 36px', position:'relative', zIndex:2,

          <div style={{ fontSize:9, color:'rgba(154,149,139,0.65)', marginTop:8, letterSpacing:0.3 }}>

            fontFamily:'"Bodoni Moda", serif', fontStyle:'italic', fontSize:32, color:MG_LINEN,

          <span style={{
            fontSize:10.5, letterSpacing:1, color:MG_DANGER,
            borderBottom:`0.5px solid ${MG_DANGER}`, paddingBottom:2, cursor:'pointer',
          }}>Отменить бронь</span>
          <div style={{ fontSize:9, color:'rgba(154,149,139,0.6)', marginTop:8 }}>
            бесплатно за 24 часа до визита

        </div>

function Corner({ pos }) {
  const base = { position:'absolute', width:18, height:18, pointerEvents:'none' };
  const s = { ...base };
  if (pos === 'tl') { s.top = 4; s.left = 4; }
  if (pos === 'tr') { s.top = 4; s.right = 4; s.transform = 'scaleX(-1)'; }
  if (pos === 'bl') { s.bottom = 4; s.left = 4; s.transform = 'scaleY(-1)'; }
  if (pos === 'br') { s.bottom = 4; s.right = 4; s.transform = 'scale(-1,-1)'; }
  return (
    <svg style={s} viewBox="0 0 18 18">
      <path d="M0 10V0h10" stroke={V2_GOLD} strokeWidth="0.7" fill="none" opacity="0.7"/>
      <path d="M3 9V3h6" stroke={V2_GOLD} strokeWidth="0.5" fill="none" opacity="0.5"/>
      <rect x="0.5" y="0.5" width="2" height="2" transform="rotate(45 1.5 1.5)" fill={V2_GOLD} opacity="0.6"/>
    </svg>
  );
}

(function() {
  const panel = document.getElementById('tweaks-panel');

  const fab = document.getElementById('tweaks-fab');
  const closeBtn = document.getElementById('tweaks-close');
  let state = { ...TWEAKS };

  function set(key, value) {
    state = { ...state, [key]: value };
    window.__applyTweaks && window.__applyTweaks({ [key]: value });
    try {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: value } }, '*');
    } catch (e) {}
    render();
  }

  function render() {
    body.innerHTML = '';
    const sections = [
      { key: 'lang', label: 'Язык', options: [['ru', 'RU'], ['en', 'EN']] },

      { key: 'name', label: 'Имя члена клуба', kind: 'text' },
      { key: 'memberNo', label: 'Номер', kind: 'text' },
    ];

    sections.forEach(s => {
      const wrap = document.createElement('div');
      wrap.className = 'tweaks-section';
      if (s.disabled) wrap.style.opacity = 0.35;
      const lbl = document.createElement('div');
      lbl.className = 'tweaks-label';
      lbl.textContent = s.label;
      wrap.appendChild(lbl);

      if (s.kind === 'text') {
        const inp = document.createElement('input');
        inp.className = 'tweaks-input';
        inp.value = state[s.key] ?? '';
        inp.oninput = e => set(s.key, e.target.value);
        wrap.appendChild(inp);
      } else {
        const row = document.createElement('div');
        row.className = 'tweaks-row';
        s.options.forEach(([val, label]) => {
          const b = document.createElement('button');
          b.textContent = label;
          let cur = state[s.key];
          let parsed = val;
          if (s.kind === 'bool') parsed = (val === 'true');
          if (String(cur) === String(parsed)) b.classList.add('active');
          b.onclick = () => { if (!s.disabled) set(s.key, parsed); };
          row.appendChild(b);
        });
        wrap.appendChild(row);
      }
      body.appendChild(wrap);
    });
  }

  // Protocol: register listener FIRST
  window.addEventListener('message', (e) => {
    if (!e.data) return;
    if (e.data.type === '__activate_edit_mode') {
      fab.classList.add('visible');
      panel.classList.add('open');
      fab.style.display = 'none';
      render();
    } else if (e.data.type === '__deactivate_edit_mode') {
      fab.classList.remove('visible');
      fab.style.display = 'none';
      panel.classList.remove('open');
    }
  });

  closeBtn.onclick = () => {
    panel.classList.remove('open');
    fab.classList.add('visible');
    fab.style.display = 'flex';
  };
  fab.onclick = () => {
    panel.classList.add('open');
    fab.style.display = 'none';
  };

  // Then announce
  try {
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  } catch (e) {}
})();
</script>

</body>
</html>
